[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
logfile_maxbytes=5MB
logfile_backups=2

[program:php-fpm]
command=php-fpm --nodaemonize
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:queue-worker]
command=php /var/www/artisan queue:work redis --queue=tenant-creation,default --sleep=3 --tries=3 --max-time=3600
user=www
autostart=true
autorestart=true
priority=3
numprocs=1
stopwaitsecs=3600
stdout_logfile=/var/www/storage/logs/queue-worker.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/www/storage/logs/queue-worker-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2

[program:scheduler]
command=/bin/bash -c "while true; do php /var/www/artisan schedule:run --verbose --no-interaction; sleep 60; done"
user=www
autostart=true
autorestart=true
priority=4
stdout_logfile=/var/www/storage/logs/scheduler.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/www/storage/logs/scheduler-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2
